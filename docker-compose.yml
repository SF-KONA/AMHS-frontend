services:
  frontend:
    container_name: amhs-frontend
    image: amhs-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # BE 서버 URL — .env.production 대신 여기서 override 가능
        # Oracle Cloud VM의 BE 주소로 변경
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "80:80"
    restart: always
